# ============================================================
#  CI Pipeline — StockAlert TP B3 DevOps
# ============================================================
#
# MATRICE DE DÉCLENCHEMENT :
#
#   push main    → test + lint
#   push staging → test + lint + build + deploy-staging
#   tag v*       → test + lint + build
#
# JOBS :
#   1. test          → tests unitaires (bloque tout si rouge)
#   2. lint          → style ESLint (nécessite test vert)
#   3. build         → Build → Trivy → Push Docker Hub
#                      (tags v* OU branche staging)
#   4. deploy-staging → simulation de déploiement staging
#                      (branche staging UNIQUEMENT)
# ============================================================

name: CI

on:
  push:
    branches:
      - main
      - staging
    tags:
      - "v*"
  pull_request:
    branches:
      - main

jobs:

  # ── JOB 1 : Tests unitaires ────────────────────────────────────────
  # Premier rempart : si les tests échouent,
  # on arrête tout — lint ne démarre pas.
  # ──────────────────────────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Run unit tests
        run: npm test

  # ── JOB 2 : Lint (style du code) ──────────────────────────────────
  # "needs: test" = ce job ne démarre QUE si le job "test" a réussi.
  # Si "test" est rouge → "lint" est annulé automatiquement par GitHub.
  # ──────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Check code style (ESLint)
        run: npm run lint

  # ── JOB 3 : Build → Scan Trivy → Push ────────────────────────────
  # "needs: [test, lint]" = attend que les 2 jobs soient VERTS.
  #
  # Condition : tourne sur tag v* OU sur push staging.
  #   tag v*       → image taguée avec le numéro de version (ex: v1.0.2)
  #   push staging → image taguée "staging"
  #   push main    → ce job n'apparaît pas du tout
  #
  # Dans les deux cas github.ref_name donne le bon tag Docker :
  #   ref_name sur tag v1.0.2  → "v1.0.2"
  #   ref_name sur branche     → "staging"
  # ──────────────────────────────────────────────────────────────────
  build:
    name: Build, Scan & Push Docker image
    runs-on: ubuntu-latest
    needs: [test, lint]
    if: startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/staging'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ÉTAPE 1/3 — Build uniquement en local
      # "load: true"  → charge l'image dans le daemon Docker du runner
      # "push: false" → pas de push encore, Trivy doit d'abord valider
      - name: Build Docker image (local only)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/stockalert:${{ github.ref_name }}

      # ÉTAPE 2/3 — Scan de sécurité Trivy
      # Analyse les packages OS (Alpine) et npm dans l'image locale.
      # exit-code: "1" → ce job échoue si au moins une CVE CRITICAL est trouvée.
      # L'étape suivante (push) ne se lance pas si ce step échoue.
      - name: Security scan with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ secrets.DOCKERHUB_USERNAME }}/stockalert:${{ github.ref_name }}
          exit-code: "1"
          severity: "CRITICAL"
          format: "table"

      # ÉTAPE 3/3 — Push sur Docker Hub
      # Ce step n'est atteint QUE si Trivy n'a détecté aucune CVE CRITICAL.
      # L'image est déjà dans le daemon local → simple `docker push`.
      - name: Push to Docker Hub
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/stockalert:${{ github.ref_name }}

  # ── JOB 4 : Deploy Staging ────────────────────────────────────────
  # "needs: build" = ne démarre qu'après un build réussi.
  #
  # "if: github.ref == 'refs/heads/staging'" = condition clé :
  #   ce job tourne UNIQUEMENT sur push staging.
  #   Sur un tag v* → build tourne mais deploy-staging est skippé.
  #   Sur push main → ce job n'apparaît pas.
  #
  # En production ce step ferait un SSH, un kubectl apply, un
  # docker-compose pull+up, etc. Ici on simule avec un echo.
  # ──────────────────────────────────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/staging'

    steps:
      - name: Deploy staging image
        run: |
          echo "Deploying ${{ secrets.DOCKERHUB_USERNAME }}/stockalert:staging"
          echo "Environment : staging"
          echo "Deployment successful"
