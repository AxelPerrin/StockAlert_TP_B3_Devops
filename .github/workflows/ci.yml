# ============================================================
#  CI Pipeline — StockAlert TP B3 DevOps
# ============================================================
#
# DÉCLENCHEURS :
#   - Push sur main
#   - Pull Request vers main
#   - Push d'un tag v* (ex: v1.0.0)
#
# JOBS (dans l'ordre d'exécution) :
#
#   1. test  → installe les dépendances et lance les tests unitaires
#              Si ce job échoue, la pipeline s'arrête ici.
#
#   2. lint  → attend que "test" soit VERT, puis vérifie le style
#              du code avec ESLint.
#
#   3. build → attend que "test" ET "lint" soient VERTS.
#              SE DÉCLENCHE UNIQUEMENT sur un tag v*.
#              Builder l'image Docker et la pusher sur Docker Hub
#              avec le tag git comme tag Docker (ex: v1.0.0).
# ============================================================

name: CI

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main

jobs:

  # ── JOB 1 : Tests unitaires ────────────────────────────────────────
  # Premier rempart : si les tests échouent,
  # on arrête tout — lint ne démarre pas.
  # ──────────────────────────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Run unit tests
        run: npm test

  # ── JOB 2 : Lint (style du code) ──────────────────────────────────
  # "needs: test" = ce job ne démarre QUE si le job "test" a réussi.
  # Si "test" est rouge → "lint" est annulé automatiquement par GitHub.
  # ──────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Check code style (ESLint)
        run: npm run lint

  # ── JOB 3 : Build → Scan Trivy → Push ────────────────────────────
  # "needs: [test, lint]" = attend que les 2 jobs soient VERTS.
  # "if: startsWith(...)" = uniquement sur un tag v*.
  #
  # Ordre des étapes :
  #   1. Build local  — image chargée dans le daemon Docker du runner
  #                     (pas encore sur Docker Hub)
  #   2. Trivy scan   — analyse l'image pour des CVE CRITICAL
  #                     exit-code 1 → le job échoue, le push n'a pas lieu
  #   3. Push         — n'arrive ici QUE si Trivy n'a rien trouvé de critique
  # ──────────────────────────────────────────────────────────────────
  build:
    name: Build, Scan & Push Docker image
    runs-on: ubuntu-latest
    needs: [test, lint]
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ÉTAPE 1/3 — Build uniquement en local
      # "load: true"  → charge l'image dans le daemon Docker du runner
      # "push: false" → pas de push encore, Trivy doit d'abord valider
      - name: Build Docker image (local only)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/stockalert:${{ github.ref_name }}

      # ÉTAPE 2/3 — Scan de sécurité Trivy
      # Analyse les packages OS (Alpine) et npm dans l'image locale.
      # exit-code: "1" → ce job échoue si au moins une CVE CRITICAL est trouvée.
      # L'étape suivante (push) ne se lance pas si ce step échoue.
      - name: Security scan with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ secrets.DOCKERHUB_USERNAME }}/stockalert:${{ github.ref_name }}
          exit-code: "1"
          severity: "CRITICAL"
          format: "table"

      # ÉTAPE 3/3 — Push sur Docker Hub
      # Ce step n'est atteint QUE si Trivy n'a détecté aucune CVE CRITICAL.
      # L'image est déjà dans le daemon local → simple `docker push`.
      - name: Push to Docker Hub
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/stockalert:${{ github.ref_name }}
