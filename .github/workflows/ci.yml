# ============================================================
#  CI Pipeline — StockAlert TP B3 DevOps
# ============================================================
#
# DÉCLENCHEURS :
#   - Push sur main
#   - Pull Request vers main
#
# JOBS (dans l'ordre d'exécution) :
#
#   1. test  → installe les dépendances et lance les tests unitaires
#              Si ce job échoue, la pipeline s'arrête ici.
#
#   2. lint  → attend que "test" soit VERT, puis vérifie le style
#              du code avec ESLint.
#              Logique : on ne vérifie le style que si le code
#              fonctionne déjà correctement.
# ============================================================

name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:

  # ── JOB 1 : Tests unitaires ────────────────────────────────────────
  # Premier rempart : si les tests échouent,
  # on arrête tout — lint ne démarre pas.
  # ──────────────────────────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Run unit tests
        run: npm test

  # ── JOB 2 : Lint (style du code) ──────────────────────────────────
  # "needs: test" = ce job ne démarre QUE si le job "test" a réussi.
  # Si "test" est rouge → "lint" est annulé automatiquement par GitHub.
  # ──────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Check code style (ESLint)
        run: npm run lint
