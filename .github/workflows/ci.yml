# ============================================================
#  CI Pipeline — StockAlert TP B3 DevOps
# ============================================================
#
# DÉCLENCHEURS :
#   - Push sur main
#   - Pull Request vers main
#   - Push d'un tag v* (ex: v1.0.0)
#
# JOBS (dans l'ordre d'exécution) :
#
#   1. test  → installe les dépendances et lance les tests unitaires
#              Si ce job échoue, la pipeline s'arrête ici.
#
#   2. lint  → attend que "test" soit VERT, puis vérifie le style
#              du code avec ESLint.
#
#   3. build → attend que "test" ET "lint" soient VERTS.
#              SE DÉCLENCHE UNIQUEMENT sur un tag v*.
#              Builder l'image Docker et la pusher sur Docker Hub
#              avec le tag git comme tag Docker (ex: v1.0.0).
# ============================================================

name: CI

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main

jobs:

  # ── JOB 1 : Tests unitaires ────────────────────────────────────────
  # Premier rempart : si les tests échouent,
  # on arrête tout — lint ne démarre pas.
  # ──────────────────────────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Run unit tests
        run: npm test

  # ── JOB 2 : Lint (style du code) ──────────────────────────────────
  # "needs: test" = ce job ne démarre QUE si le job "test" a réussi.
  # Si "test" est rouge → "lint" est annulé automatiquement par GitHub.
  # ──────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Check code style (ESLint)
        run: npm run lint

  # ── JOB 3 : Build & Push Docker image ─────────────────────────────
  # "needs: [test, lint]" = attend que les 2 jobs soient VERTS.
  #
  # "if: startsWith(github.ref, 'refs/tags/v')" = condition clé :
  #   ce job est DÉFINI dans le workflow mais GitHub ne le démarre
  #   que si le déclencheur est un tag commençant par "v".
  #   Sur un push main ou une PR → ce job n'apparaît même pas.
  #
  # Le tag Docker = le tag git (github.ref_name).
  #   Ex: git tag v1.0.0 → image publiée sous :v1.0.0 sur Docker Hub
  # ──────────────────────────────────────────────────────────────────
  build:
    name: Build & Push Docker image
    runs-on: ubuntu-latest
    needs: [test, lint]
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Authentification Docker Hub via les secrets GitHub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Build l'image et la pousse avec le tag git comme tag Docker
      # github.ref_name vaut exactement le nom du tag (ex: "v1.0.0")
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/stockalert:${{ github.ref_name }}
